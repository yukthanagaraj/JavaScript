<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator</title>

    <!-- Bootstrap -->
   <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"> integrity="sha384-9aIt2nRpC12Uk9g59baD1411NQApFmC26EwAOH8Wgz15MYYxFfc+NcPb1dKGj75k" crossright="anonymous" />
    <style>
        body {
            background: #343a40;
        }

        .card {
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        #loading, #results {
            display: none;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card card-body text-center mt-5">

                <h2 class="heading pb-3">Loan Calculator</h2>

                <form id="loan-form">

                    <!-- Loan Amount -->
                    <div class="form-group">
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text">₹</span>
                            </div>
                            <input type="number" id="loan_amount" class="form-control" placeholder="Loan Amount">
                        </div>
                    </div>

                    <!-- Interest -->
                    <div class="form-group">
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text">%</span>
                            </div>
                            <input type="number" id="interest" class="form-control" placeholder="Interest">
                        </div>
                    </div>

                    <!-- Years -->
                    <div class="form-group">
                        <input type="number" id="years" class="form-control" placeholder="Years to Pay">
                    </div>

                    <!-- Button -->
                    <div class="form-group">
                        <button type="submit" class="btn btn-dark btn-block">Calculate</button>
                    </div>

                </form>

                <!-- Loading Spinner -->
                <div id="loading" class="text-center">
                    <div class="spinner-border text-dark" style="width: 3rem; height: 3rem;" role="status"></div>
                    <p class="mt-2">Calculating</p>
                </div>

                <!-- Results -->
                <div id="results" class="pt-4">
                    <h4>Results</h4>

                    <div class="form-group">
                        <input type="text" id="monthly_payment" class="form-control" placeholder="Monthly Payment" disabled>
                    </div>

                    <div class="form-group">
                        <input type="text" id="total_amount" class="form-control" placeholder="Total Amount" disabled>
                    </div>

                    <div class="form-group">
                        <input type="text" id="total_interest" class="form-control" placeholder="Total Interest" disabled>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
